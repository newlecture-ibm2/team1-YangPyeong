name: Deploy to Server

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cd /home/farm/dist/team1-YangPyeong
          cat > .env << EOF
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          cd /home/farm/dist/team1-YangPyeong
          git pull origin dev
          docker compose down
          docker compose up --build -d

      - name: Health check
        run: |
          sleep 10
          docker compose -f /home/farm/dist/team1-YangPyeong/docker-compose.yml ps
