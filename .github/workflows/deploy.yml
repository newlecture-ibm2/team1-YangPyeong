name: Deploy to Server

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cd /home/farm/dist/team1-YangPyeong
          cat > .env << EOF
          DB_USERNAME=${{ vars.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_KAKAO_MAP_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_MAP_KEY }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KMA_API_KEY=${{ secrets.KMA_API_KEY }}
          SOIL_API_KEY=${{ secrets.SOIL_API_KEY }}
          NONGSARO_API_KEY=${{ secrets.NONGSARO_API_KEY }}
          KOSIS_API_KEY=${{ secrets.KOSIS_API_KEY }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          cd /home/farm/dist/team1-YangPyeong
          git pull origin dev
          docker compose down
          docker compose up --build -d

      - name: Health check
        run: |
          sleep 10
          docker compose -f /home/farm/dist/team1-YangPyeong/docker-compose.yml ps
