spring:
  application:
    name: farm-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── DataSource ──
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/farm_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  # ── Servlet (파일 업로드) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-to-32-chars}
  access-token-expiration: 1800000   # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

# ── External API Keys ──
external:
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
  kma:
    api-key: ${KMA_API_KEY:}
  soil:
    api-key: ${SOIL_API_KEY:}
  nongsaro:
    api-key: ${NONGSARO_API_KEY:}
  kosis:
    api-key: ${KOSIS_API_KEY:}

# ── AI Server ──
ai:
  server-url: ${AI_SERVER_URL:http://ai-server:8000}
  agent-url: ${AGENT_SERVER_URL:http://agent-server:8001}

# ── Server ──
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Logging (X-Correlation-Id 포함) ──
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.farmbalance: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/farm-backend.log

# ── Springdoc (Swagger) ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Resilience4j (Retry / CircuitBreaker) ──
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2000ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
    instances:
      oauthRetry:
        base-config: default
      apiRetry:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      oauthCircuitBreaker:
        base-config: default
