spring:
  application:
    name: farm-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── DataSource ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farmbalance}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": public

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── Servlet (파일 업로드) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-to-32-chars}
  access-token-expiration: 1800000   # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

# ── Server ──
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Logging (X-Correlation-Id 포함) ──
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    "[com.farmbalance]": DEBUG
    "[org.springframework.security]": INFO
  file:
    name: logs/farm-backend.log

# ── Springdoc (Swagger) ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
