spring:
  application:
    name: farm-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── DataSource ──
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/farm_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      # Flyway를 도입했으므로 엔티티 구조와 DB 테이블 구조가 일치하는지만 깐깐하게 검사(validate)합니다.
      # 이제부터 테이블을 수정하려면 무조건 Flyway V_ 버전 SQL 파일을 추가해야 합니다!
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  # ── Flyway (DB 마이그레이션) ──
  flyway:
    enabled: true
    baseline-on-migrate: true # 기존에 테이블이 있는 DB라도 충돌 없이 베이스라인부터 시작하도록 허용
    baseline-version: 1
    out-of-order: true # 순서가 뒤바뀐 마이그레이션도 실행 허용 (V10.4 등)
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing" # DB에 적용됐으나 로컬 파일이 없는 마이그레이션 무시

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  # ── Mail (SMTP) ──
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    default-encoding: UTF-8

  # ── Servlet (파일 업로드) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-to-32-chars}
  access-token-expiration: 43200000   # 12시간 (프론트엔드 무활동 30분 타이머가 로그아웃 주도)
  refresh-token-expiration: 604800000 # 7일 (ms)

# ── External API Keys ──
external:
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
  weather:
    base-url: ${WEATHER_BASE_URL:}
    fcst-url: ${WEATHER_FCST_URL:}
    api-key: ${WEATHER_API_KEY:}
  soil:
    api-key: ${SOIL_API_KEY:}
  nongsaro:
    default-key: ${NONGSARO_API_KEY_DEFAULT:}
    crop-ebook-key: ${NONGSARO_API_KEY_CROP_EBOOK:}
  kosis:
    api-key: ${KOSIS_API_KEY:}

# ── KAMIS API (농산물 시세 조회) 설정 ──
kamis:
  api:
    url: ${KAMIS_API_URL:http://www.kamis.or.kr/service/price/xml.do}
    cert-key: ${KAMIS_CERT_KEY:8291e7b2-28a1-469c-93ac-fba3ef05f174}
    cert-id: ${KAMIS_CERT_ID:7941}

# ── AI Server ──
ai:
  server-url: ${AI_SERVER_URL}

# ── Server ──
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Logging (X-Correlation-Id 포함) ──
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-N/A}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.farmbalance: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/farm-backend.log

# ── Springdoc (Swagger) ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Resilience4j (Retry / CircuitBreaker) ──
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2000ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      oauthRetry:
        base-config: default
      apiRetry:
        base-config: default
      aiRetry:
        base-config: default
        wait-duration: 5000ms
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
          - com.farmbalance.global.error.BusinessException
    instances:
      oauthCircuitBreaker:
        base-config: default

# ── Custom App Properties ──
app:
  policy:
    scheduler-enabled: true
