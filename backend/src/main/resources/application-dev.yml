spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farm_db}
    username: ${DB_USERNAME:farm_admin}
    password: ${DB_PASSWORD:farm_secret_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080
