# ── Dev 프로필 전용 설정 ──
# application.yml의 설정을 상속받고, dev에서만 다른 부분만 덮어씁니다.

spring:
  # 운영 DB에 SSH 터널로 붙어 개발할 때, 이미 적용된 마이그레이션 파일의
  # 체크섬 불일치 에러를 방지. 새 마이그레이션 적용은 정상 동작함.
  flyway:
    validate-on-migrate: false

  # ── Cache (로컬에서는 Redis 대신 메모리 캐시 사용) ──
  cache:
    type: simple

  # ── DataSource ──
  datasource:
    url: jdbc:postgresql://localhost:5151/farm_db
    username: farm
    password: farmbalance1234!
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
