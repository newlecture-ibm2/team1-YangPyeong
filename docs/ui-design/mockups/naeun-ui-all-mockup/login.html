<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — FarmBalance</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo-area">
      <img src="./logo.png" alt="FarmBalance">
      <span>FarmBalance</span>
    </div>
    <h1 class="auth-title">로그인</h1>
    <p class="auth-sub">양평군 스마트 농업 플랫폼에 오신 것을 환영합니다.</p>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" class="form-input" placeholder="example@farmbalance.kr">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" class="form-input" placeholder="비밀번호를 입력하세요">
    </div>
    <button class="btn btn-dark" style="width:100%; justify-content:center; margin-top:8px;">로그인</button>
    <div class="auth-divider">또는</div>
    <button class="btn btn-kakao" style="width:100%; justify-content:center;">🟡 카카오로 시작하기</button>
    <p class="auth-footer">계정이 없으신가요? <a href="./signup.html">회원가입</a></p>
  </div>
</div>
</body>
</html>
