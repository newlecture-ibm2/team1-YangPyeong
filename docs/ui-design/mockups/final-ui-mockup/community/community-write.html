<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FarmBalance — 글 작성</title><link rel="stylesheet" href="../style.css">
<style>.upload-zone{border:2px dashed var(--color-border);border-radius:var(--radius-md);padding:40px;text-align:center;color:var(--color-text-secondary);cursor:pointer;transition:border-color .2s;}.upload-zone:hover{border-color:var(--color-primary);}</style>
</head>
<body>
<nav class="nav">
  <a href="../landing.html" class="nav-logo"><img src="../logo.png" alt="FarmBalance 로고"> FarmBalance</a>
  <div class="nav-links"><a href="../farm/farm-manage.html">내 농장</a><a href="../shop/shop-browse.html">상점</a><a href="../stores/store-map.html">가게</a><a href="../community/community-list.html" class="active">커뮤니티</a></div>
  <div class="nav-right"><a href="../auth/login.html" class="btn-nav btn-nav-outline">로그인</a><a href="../auth/signup.html" class="btn-nav btn-nav-fill">시작하기</a></div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="breadcrumb"><a href="../landing.html">홈</a> › <a href="../community/community-list.html">커뮤니티</a> › <strong>글 작성</strong></div>
    <h1 class="page-title">글 작성</h1>
  </div>
  <div class="card mb-32">
    <div class="grid-2 mb-24">
      <div class="form-group"><label class="form-label">카테고리 <span style="color:var(--color-danger);">*</span></label><select class="form-select"><option>선택하세요</option><option>재배 노하우</option><option>병해충 Q&A</option><option>자유게시판</option><option>장터</option></select></div>
      <div class="form-group"><label class="form-label">태그</label><input class="form-input" placeholder="예: #상추 #진딧물"></div>
    </div>
    <div class="form-group mb-24"><label class="form-label">제목 <span style="color:var(--color-danger);">*</span></label><input class="form-input" placeholder="제목을 입력하세요"></div>
    <div class="form-group mb-24"><label class="form-label">내용 <span style="color:var(--color-danger);">*</span></label><textarea class="form-textarea" style="min-height:300px;" placeholder="내용을 입력하세요"></textarea></div>
    <div class="form-group"><label class="form-label">이미지 첨부</label><div class="upload-zone"><div style="font-size:32px;margin-bottom:8px;">📷</div><div>이미지를 드래그하거나 클릭하여 업로드</div><div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px;">JPEG, PNG (최대 5MB, 5장)</div></div></div>
  </div>
  <div style="display:flex;gap:12px;justify-content:flex-end;">
    <button class="btn btn-outline">취소</button>
    <button class="btn btn-outline">임시 저장</button>
    <button class="btn btn-primary">게시하기</button>
  </div>
</div>
<footer class="footer"><div class="footer-brand"><img src="../logo.png" alt="">FarmBalance</div><div class="footer-copy">© 2026 FarmBalance. All rights reserved.</div></footer>
</body></html>
