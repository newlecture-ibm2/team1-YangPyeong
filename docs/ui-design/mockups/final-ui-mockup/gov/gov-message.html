<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBalance — 지자체: 행정 알림(권고) 발송</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .message-form-card { background: var(--color-surface); border-radius: var(--radius-md); padding: 32px; border: 1px solid var(--color-border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-logo"><img src="../logo.png" alt=""> Farm<span class="italic">Balance</span></a>
  <div class="nav-links"><a href="../gov/gov-dashboard.html">대시보드</a><a href="../balance/balance-list.html">수급관리</a><a href="#">농가관리</a><a href="../policy/policy-list.html">정책</a></div>
  <div class="nav-right"><a class="btn-nav btn-nav-fill" href="#">양평군 관리자</a></div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="breadcrumb"><a href="../landing.html">홈</a> › <a href="./gov-dashboard.html">대시보드</a> › <strong>행정 알림 발송</strong></div>
    <h1 class="page-title">📢 행정 알림(권고) 발송</h1>
    <p class="page-sub">농가에 수급 관련 권고나 긴급 재난, 병해충 알림을 발송합니다.</p>
  </div>

  <div class="message-form-card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">발송 대상 유형 <span style="color:var(--color-danger);">*</span></label>
        <select class="form-select">
          <option value="ALL">전체 농가</option>
          <option value="CROP" selected>특정 작물 재배 농가</option>
          <option value="REGION">특정 지역(읍/면)</option>
          <option value="USER">개별 농가 지정</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">대상 상세 선택 <span style="color:var(--color-danger);">*</span></label>
        <select class="form-select">
          <option value="ONION" selected>양파 (긴급 과잉)</option>
          <option value="POTATO">감자 (긴급 부족)</option>
          <option value="PEPPER">고추 (주의 과잉)</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">발송 채널 <span style="color:var(--color-danger);">*</span></label>
        <select class="form-select">
          <option value="IN_APP">앱 내 알림 (기본)</option>
          <option value="SMS">SMS 문자 발송</option>
          <option value="EMAIL">이메일 발송</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">알림 제목 <span style="color:var(--color-danger);">*</span></label>
      <input type="text" class="form-input" value="[양평군청] 양파 재배 과잉에 따른 출하 조절 권고">
    </div>

    <div class="form-group">
      <label class="form-label">알림 내용 <span style="color:var(--color-danger);">*</span></label>
      <textarea class="form-input" style="height: 150px;">현재 양평군 내 양파의 재배(공급) 예측량이 수요 대비 172%로 심각한 과잉 상태입니다.
수확 시기가 도래하는 농가에서는 일시적인 가격 하락을 방지하기 위해 출하 시기를 분산해 주시거나 저온 저장을 적극 활용해 주시기를 권고드립니다.
관련 지원 정책은 정책 게시판을 참고해 주세요.</textarea>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;">
      <button class="btn btn-outline">취소</button>
      <button class="btn btn-primary">발송하기 (예상 대상: 342명)</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-brand"><img src="../logo.png" alt=""> Farm<span class="italic">Balance</span></div>
  <p class="footer-copy">© 2026 FarmBalance. 양평군 스마트 파밍 플랫폼</p>
</footer>
</body>
</html>
