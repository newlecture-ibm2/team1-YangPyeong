<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBalance — 로그인</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo-area"><img src="../logo.png" alt=""><span>Farm<em>Balance</em></span></div>
    <h2 class="auth-title">로그인</h2>
    <p class="auth-sub">양평군 스마트 파밍 플랫폼에 오신 것을 환영합니다</p>
    <div class="form-group"><label class="form-label">이메일</label><input class="form-input" type="email" placeholder="farmer@yangpyeong.kr"></div>
    <div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" type="password" placeholder="비밀번호 입력"></div>
    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" type="button">로그인</button>
    <div class="auth-divider">또는</div>
    <button class="btn btn-kakao" style="width:100%;justify-content:center;" type="button">🟡 카카오로 시작하기</button>
    <p class="auth-footer">계정이 없으신가요? <a href="../auth/signup.html">회원가입 →</a></p>
  </div>
</div>
</body>
</html>
