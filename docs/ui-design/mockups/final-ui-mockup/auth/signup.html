<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBalance — 회원가입</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:540px;">
    <div class="logo-area"><img src="../logo.png" alt=""><span>Farm<em>Balance</em></span></div>
    <h2 class="auth-title">회원가입</h2>
    <p class="auth-sub">양평군 농업인을 위한 통합 플랫폼에 가입하세요</p>

    <p class="text-label mb-16">역할 선택</p>
    <div class="flex gap-8 mb-24">
      <label style="flex:1;display:flex;align-items:center;gap:8px;padding:14px 16px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><input type="radio" name="role" checked> 농업인</label>
      <label style="flex:1;display:flex;align-items:center;gap:8px;padding:14px 16px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><input type="radio" name="role"> 일반 사용자</label>
      <label style="flex:1;display:flex;align-items:center;gap:8px;padding:14px 16px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><input type="radio" name="role"> 지자체</label>
    </div>

    <div class="grid-2">
      <div class="form-group"><label class="form-label">이름</label><input class="form-input" placeholder="홍길동"></div>
      <div class="form-group"><label class="form-label">전화번호</label><input class="form-input" placeholder="010-0000-0000"></div>
    </div>
    <div class="form-group"><label class="form-label">이메일</label><input class="form-input" type="email" placeholder="farmer@yangpyeong.kr"></div>
    <div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" type="password" placeholder="8자 이상"></div>
    <div class="form-group"><label class="form-label">비밀번호 확인</label><input class="form-input" type="password" placeholder="비밀번호 재입력"></div>

    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px;" type="button">가입하기 <span class="arrow">→</span></button>
    <p class="auth-footer">이미 계정이 있으신가요? <a href="../auth/login.html">로그인 →</a></p>
  </div>
</div>
</body>
</html>
