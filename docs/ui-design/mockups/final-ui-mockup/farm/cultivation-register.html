<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBalance — 재배 등록</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .seed-card { background: var(--color-surface); border-radius: var(--radius-md); padding: 28px; border: 1px solid var(--color-border); margin-bottom: 20px; }
    .seed-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
    .seed-num { display: inline-block; background: var(--color-primary-pale); color: var(--color-primary); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill); }
    .seed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="../landing.html" class="nav-logo"><img src="../logo.png" alt="FarmBalance 로고"> FarmBalance</a>
  <div class="nav-links"><a href="../farm/farm-manage.html" class="active">내 농장</a><a href="../shop/shop-browse.html">상점</a><a href="../stores/store-map.html">가게</a><a href="../community/community-list.html">커뮤니티</a></div>
  <div class="nav-right"><a href="../auth/login.html" class="btn-nav btn-nav-outline">로그인</a><a href="../auth/signup.html" class="btn-nav btn-nav-fill">시작하기</a></div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="breadcrumb"><a href="../landing.html">홈</a> › <a href="../farm/farm-manage.html">농장관리</a> › <strong>재배 등록</strong></div>
    <h1 class="page-title">재배 등록</h1>
    <p class="page-sub">재배할 작물과 면적을 등록하여 수급 데이터 예측을 시작합니다.</p>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <span class="text-small">등록 대기 중인 작물 <strong style="color:var(--color-primary);">1</strong>건</span>
    <button class="btn btn-dark btn-sm">＋ 작물 추가</button>
  </div>

  <div class="seed-card">
    <div class="seed-card-header"><div><span class="seed-num">1</span> <strong style="margin-left:8px;">재배 계획 정보</strong></div><button class="btn btn-outline btn-sm">✕</button></div>
    <div class="seed-grid">
      <div class="form-group"><label class="form-label">작물 분류 <span style="color:var(--color-danger);">*</span></label><select class="form-select"><option>선택하세요</option><option>엽채류</option><option>근채류</option><option>과채류</option><option>곡류</option></select></div>
      <div class="form-group"><label class="form-label">작물명 <span style="color:var(--color-danger);">*</span></label><select class="form-select" disabled><option>작물 분류를 먼저 선택하세요</option></select></div>
      <div class="form-group"><label class="form-label">재배 면적 (㎡) <span style="color:var(--color-danger);">*</span></label><input type="number" class="form-input" placeholder="예) 1000"></div>
      <div class="form-group"><label class="form-label">종자 형태 <span style="color:var(--color-danger);">*</span></label><select class="form-select"><option>씨앗 (SEED)</option><option>종자 (SEEDLING)</option><option>모종 (SAPLING)</option></select></div>
      <div class="form-group" style="grid-column: span 2;"><label class="form-label">농가 예상 총 생산량 <span style="color:var(--color-danger);">*</span></label><div style="display:flex;gap:8px;"><input type="number" class="form-input" placeholder="예) 500"><select class="form-select" style="width:90px;"><option>kg</option><option>g</option><option>ton</option></select></div></div>
    </div>
  </div>

  <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;">
    <button class="btn btn-outline">취소</button>
    <button class="btn btn-primary">등록하기</button>
  </div>
</div>

<footer class="footer">
  <div class="footer-brand"><img src="../logo.png" alt="">FarmBalance</div>
  <div class="footer-copy">© 2026 FarmBalance. All rights reserved.</div>
</footer>
</body>
</html>
