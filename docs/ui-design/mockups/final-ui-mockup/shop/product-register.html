<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBalance — 상품 등록</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-logo"><img src="../logo.png" alt=""> Farm<span class="italic">Balance</span></a>
  <div class="nav-links"><a href="../farm/farm-manage.html">내 농장</a><a href="../shop/shop-browse.html">상점</a><a href="../stores/store-map.html">가게</a><a href="../community/community-list.html">커뮤니티</a></div>
  <div class="nav-right"><a class="btn-nav btn-nav-fill" href="#">홍길동 님</a></div>
</nav>

<div class="page">
  <div class="page-header">
    <p class="breadcrumb"><a href="../mypage/profile.html">마이페이지</a> / <a href="#">판매 관리</a> / 상품 등록</p>
    <h1 class="page-title">신규 상품 <span class="italic">등록</span></h1>
    <p class="page-sub">판매하고 싶은 농산물이나 가공품을 상점에 등록하고 구매자와 연결하세요.</p>
  </div>

  <div style="max-width: 900px; margin: 0 auto;">
    <!-- 1️⃣ 기본 정보 (Basic Info) -->
    <div class="card mb-32" style="padding: 40px;">
      <h3 class="card-title" style="font-size: 24px; margin-bottom: 32px;">📦 기본 정보</h3>
      <div class="form-group mb-24">
        <label class="form-label" style="font-size: 17px; font-weight: 700;">상품명</label>
        <input class="form-input" style="font-size: 20px; padding: 18px; border-width: 2px;" placeholder="판매할 상품의 이름을 입력해 주세요 (예: 양평 햇 배추 10kg)">
      </div>
      <div class="grid-2" style="gap: 24px;">
        <div class="form-group">
          <label class="form-label" style="font-size: 16px; font-weight: 700;">카테고리</label>
          <select class="form-select" style="padding: 16px; font-size: 16px;">
            <option>채소류</option><option>과일류</option><option>곡물류</option><option>가공식품</option><option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" style="font-size: 16px; font-weight: 700;">판매 가격 (원)</label>
          <input class="form-input" type="number" style="padding: 16px; font-size: 18px; font-weight: 700;" placeholder="0">
        </div>
      </div>
    </div>

    <!-- 2️⃣ 생산 이력 연동 (Production History - Optional) -->
    <div class="card mb-32" style="border: 2px solid var(--color-border); padding: 40px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h3 class="card-title" style="font-size: 24px; margin-bottom:0;">🔗 생산 이력 연동</h3>
        <span class="badge" style="font-size:14px; padding:6px 16px; background: var(--color-bg); color: var(--color-text-light);">선택 사항</span>
      </div>
      <p style="font-size: 16px; color: var(--color-text-secondary); margin-bottom: 32px;">
        등록된 농장 기록이 있다면 선택해 주세요. 소비자에게 더 높은 신뢰를 줄 수 있습니다.
      </p>
      
      <div class="form-group mb-24">
        <label class="form-label" style="font-weight: 800; font-size: 16px;">수확 기록 선택 (있는 경우만)</label>
        <select class="form-select" style="padding: 18px; font-size: 16px;">
          <option>연동할 수확 기록을 선택하세요 (최근 수확순)</option>
          <option>[2026-04-30] 양평 해맑은 농장 - 배추 (500kg)</option>
          <option>[2026-04-25] 양평 해맑은 농장 - 고추 (120kg)</option>
          <option>[2026-04-20] 양평 해맑은 농장 - 감자 (1,200kg)</option>
        </select>
      </div>
    </div>

    <!-- 3️⃣ 상품 상세 설명 (Description) -->
    <div class="card mb-32" style="padding: 40px;">
      <h3 class="card-title" style="font-size: 24px; margin-bottom: 24px;">📝 상품 상세 설명</h3>
      <textarea class="form-input" style="height:300px; resize:none; padding: 24px; line-height: 1.8; font-size: 16px;" placeholder="상품의 특징, 보관 방법, 맛있게 먹는 법 등 상세한 설명을 적어주세요."></textarea>
    </div>

    <!-- 4️⃣ 상품 이미지 (Images) -->
    <div class="card mb-32" style="padding: 40px;">
      <h3 class="card-title" style="font-size: 24px; margin-bottom: 24px;">📸 상품 이미지</h3>
      <div class="grid-2" style="grid-template-columns: 2fr 1fr; gap: 24px;">
        <div class="placeholder" style="height:360px; cursor:pointer; background: #fafafa; border: 2px dashed var(--color-border);">
          <div style="text-align:center;">
            <p style="font-size:48px; margin-bottom:12px;">🖼️</p>
            <p style="font-weight:600;">메인 이미지 대표 사진 (필수)</p>
          </div>
        </div>
        <div class="grid-2" style="grid-template-rows: repeat(2, 1fr); gap: 12px;">
          <div class="placeholder" style="height:100%;">+</div>
          <div class="placeholder" style="height:100%;">+</div>
          <div class="placeholder" style="height:100%;">+</div>
          <div class="placeholder" style="height:100%;">+</div>
        </div>
      </div>
    </div>

    <!-- 5️⃣ 재고 및 배송 정보 (Inventory & Shipping) -->
    <div class="card mb-48" style="padding: 40px;">
      <h3 class="card-title" style="font-size: 24px; margin-bottom: 32px;">🚚 재고 및 배송 정보</h3>
      <div class="grid-3" style="gap: 24px;">
        <div class="form-group">
          <label class="form-label">판매 가능 재고</label>
          <input class="form-input" type="number" style="padding: 14px;" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">배송 방법</label>
          <select class="form-select" style="padding: 14px;">
            <option>택배 배송</option><option>직거래</option><option>당일 퀵</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">기본 배송비</label>
          <input class="form-input" type="number" style="padding: 14px;" value="3000">
        </div>
      </div>
    </div>

    <!-- 하단 액션 버튼 -->
    <div style="display:flex; gap:16px; margin-bottom: 100px;">
      <button class="btn btn-outline" style="flex:1; height:64px; font-size:18px; font-weight:700;">취소</button>
      <button class="btn btn-primary btn-lg" style="flex:2; height:64px; font-size:20px; font-weight:800; justify-content:center; box-shadow: 0 10px 20px rgba(16,185,129,0.2);">상품 등록하기 <span class="arrow">→</span></button>
    </div>
  </div>



</div>

<footer class="footer">
  <div class="footer-brand"><img src="../logo.png" alt=""> Farm<span class="italic">Balance</span></div>
  <p class="footer-copy">© 2026 FarmBalance. 양평군 스마트 파밍 플랫폼</p>
</footer>
</body>
</html>
