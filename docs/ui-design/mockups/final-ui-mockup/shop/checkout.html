</head>

<div class="page">
  <div class="page-header"><div class="breadcrumb"><a href="../landing.html">홈</a> › <a href="../shop/shop-browse.html">상점</a> › <strong>주문/결제</strong></div><h1 class="page-title">주문/결제</h1></div>
  <div class="grid-2" style="grid-template-columns:2fr 1fr;">
    <div>
      <div class="card mb-24"><h2 class="card-title">배송 정보</h2>
        <div class="grid-2"><div class="form-group"><label class="form-label">받는 분</label><input class="form-input" value="홍길동"></div><div class="form-group"><label class="form-label">연락처</label><input class="form-input" value="010-1234-5678"></div></div>
        <div class="form-group"><label class="form-label">배송지</label><div style="display:flex;gap:8px;margin-bottom:8px;"><input class="form-input" value="12345" style="width:120px;" readonly><button class="btn btn-outline btn-sm">주소 검색</button></div><input class="form-input" value="경기도 양평군 양평읍 양평로 123"><input class="form-input" style="margin-top:8px;" placeholder="상세 주소"></div>
        <div class="form-group"><label class="form-label">배송 메모</label><select class="form-select"><option>부재 시 문 앞에 놓아주세요</option><option>전화 후 배송 부탁드립니다</option><option>직접 입력</option></select></div>
      </div>
      <div class="card mb-24"><h2 class="card-title">결제 수단</h2><div style="display:flex;gap:8px;"><button class="btn btn-primary">카드 결제</button><button class="btn btn-outline">무통장 입금</button><button class="btn btn-outline">카카오페이</button></div></div>
      <div class="card"><h2 class="card-title">쿠폰 / 포인트</h2><div class="grid-2"><div class="form-group"><label class="form-label">쿠폰</label><select class="form-select"><option>사용 가능한 쿠폰 없음</option></select></div><div class="form-group"><label class="form-label">포인트 사용 (보유: 1,250P)</label><div style="display:flex;gap:8px;"><input class="form-input" placeholder="0" style="flex:1;"><button class="btn btn-outline btn-sm">전체 사용</button></div></div></div></div>
    </div>
    <div>
      <div class="card" style="position:sticky;top:80px;">
        <h2 class="card-title">주문 요약</h2>
        <div style="font-size:13px;border-bottom:1px solid var(--color-border);padding-bottom:12px;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>유기농 상추 x1</span><span>₩8,000</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>무농약 배추 x2</span><span>₩10,000</span></div>
          <div style="display:flex;justify-content:space-between;"><span>GAP 토마토 x1</span><span>₩12,000</span></div>
        </div>
        <table class="info-tbl"><tr><th>상품</th><td>₩30,000</td></tr><tr><th>배송비</th><td>₩3,000</td></tr><tr><th>할인</th><td style="color:var(--color-danger);">-₩0</td></tr></table>
        <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:700;margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border);"><span>결제 금액</span><span style="color:var(--color-primary);">₩33,000</span></div>
        <button class="btn btn-primary btn-lg" style="width:100%;margin-top:16px;justify-content:center;">결제하기</button>
      </div>
    </div>
  </div>
</div>
