<header class="gnb gnb-gov" id="gnb-gov">
  <div class="gnb-inner">
    <a href="../../index.html" class="gnb-logo">
      <span>🌿</span> FarmBalance
    </a>
    <nav class="gnb-nav">
      <a href="../gov/gov-dashboard.html"     data-menu="대시보드">대시보드</a>
      <a href="../gov/gov-cultivation.html"   data-menu="통계분석">통계분석</a>
      <a href="../gov/gov-download.html"      data-menu="데이터">데이터</a>
    </nav>
    <div class="gnb-right">
      <div class="gnb-icon" title="알림">🔔</div>
      <div class="gnb-icon" title="프로필">👤</div>
    </div>
  </div>
</header>

<script>
  (function(){
    var active = document.querySelector('[data-active]');
    if(!active) return;
    var menuName = active.getAttribute('data-active');
    document.querySelectorAll('.gnb-nav a').forEach(function(a){
      if(a.getAttribute('data-menu') === menuName) a.classList.add('active');
    });
  })();
</script>
