  <div class="grid-2" style="grid-template-columns:2fr 1fr;">
    <div>
      <div class="card"><h2 class="card-title">배송 정보</h2>
        <div class="grid-2"><div class="form-group"><label class="form-label">받는 분</label><input class="form-input" value="홍길동"></div><div class="form-group"><label class="form-label">연락처</label><input class="form-input" value="010-1234-5678"></div></div>

      </div>
      <div class="card"><h2 class="card-title">결제 수단</h2>

      </div>
    </div>
    <div>
      <div class="card" style="position:sticky;top:72px;">
        <h2 class="card-title">주문 요약</h2>
        <div style="font-size:13px;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px;">

        <div class="flex-between mt-16" style="font-size:20px;font-weight:700;"><span>결제 금액</span><span class="text-olive">33,000원</span></div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px;font-size:16px;">결제하기</button>
      </div>
    </div>
