<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=1440">
  <title>파종 계획 등록 — FarmBalance</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav">
    <a href="#">홈</a>
    <a href="farm-manage.html" class="active">농장관리</a>
    <a href="../balance/balance-list.html">밸런스</a>
    <a href="../recommend/recommend-list.html">추천</a>
    <a href="../policy/policy-list.html">정책</a>
    <a href="../community/community-list.html">커뮤니티</a>
    <a href="../shop/product-browse.html">상점</a>
    <a href="../stores/store-map.html">가게</a>
  </nav>
  <div class="gnb-right"><div class="gnb-icon">🔔</div><div class="gnb-icon">👤</div></div>
</div></header>

<div class="breadcrumb"><a href="../../index.html">홈</a> <span>›</span> 농장관리 <span>›</span> <strong>파종 계획 등록</strong></div>

<div class="page">
  <h1 class="page-title"><span class="icon">📅</span> 파종 계획 등록</h1>

  <div class="card">
    <div class="flex-between mb-16">
      <h2 class="card-title" style="margin-bottom:0;">양평 해맑은 농장</h2>
      <div><span class="text-muted">잔여 면적:</span> <strong>1,200㎡</strong> / 3,300㎡</div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">작물 <span class="text-red">*</span></label>
        <select class="form-select">
          <option>작물을 선택하세요</option>
          <option>상추</option>
          <option>배추</option>
          <option>고추</option>
          <option>감자</option>
          <option>토마토</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">재배 면적 (㎡) <span class="text-red">*</span></label>
        <input class="form-input" type="number" placeholder="500">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">파종 예정일 <span class="text-red">*</span></label>
        <input class="form-input" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">목표 수확량 (kg)</label>
        <input class="form-input" type="number" placeholder="200">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-textarea" placeholder="파종 계획에 대한 메모를 입력하세요"></textarea>
    </div>
  </div>

  <div class="card">
    <h2 class="card-title">기존 파종 계획 목록</h2>
    <table class="tbl">
      <thead><tr><th>작물</th><th>면적</th><th>파종일</th><th>목표 수확량</th><th>상태</th></tr></thead>
      <tbody>
        <tr><td>상추</td><td>800㎡</td><td>2026-03-01</td><td>150kg</td><td><span class="badge badge-green">파종완료</span></td></tr>
        <tr><td>배추</td><td>700㎡</td><td>2026-03-15</td><td>300kg</td><td><span class="badge badge-olive">계획중</span></td></tr>
        <tr><td>고추</td><td>600㎡</td><td>2026-04-01</td><td>100kg</td><td><span class="badge badge-olive">계획중</span></td></tr>
      </tbody>
    </table>
  </div>

  <div class="btn-row btn-row-right">
    <button class="btn btn-gray">취소</button>
    <button class="btn btn-primary">계획 등록</button>
  </div>
</div>
</body>
</html>
