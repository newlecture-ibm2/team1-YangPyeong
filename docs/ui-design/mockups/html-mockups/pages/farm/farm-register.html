<!DOCTYPE html>
<html lang="ko" data-active="농장관리">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>농장 등록 신청 — FarmBalance</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .reg-card { padding: 28px 32px; }
    .reg-card .card-title { margin-bottom: 20px; font-size: 16px; }

    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    .row-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; margin-bottom: 18px; }
    .span-3 { grid-column: 1 / -1; }

    .fg { display: flex; flex-direction: column; gap: 6px; }
    .fg-label {
      font-size: 13px; font-weight: 600; color: #444;
      display: flex; align-items: center; gap: 5px;
    }
    .fg-label .req { color: #e55353; font-weight: 700; }
    .fg-label .opt {
      font-size: 10px; font-weight: 400; color: #aaa;
      background: #f3f3f3; padding: 2px 6px; border-radius: 3px;
    }
    .fg-hint { font-size: 11px; color: #aaa; margin-top: 2px; }

    .fi, .fs {
      padding: 9px 13px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; color: #333; background: #fff; width: 100%; box-sizing: border-box;
      transition: border-color 0.15s; height: 40px;
    }
    .fi:focus, .fs:focus { outline: none; border-color: #5a7a3a; box-shadow: 0 0 0 2px rgba(90,122,58,0.08); }
    .fi[readonly] { background: #fafafa; color: #999; }

    .crop-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      display: inline-flex; align-items: center;
      padding: 5px 13px; border: 1.5px solid #ddd; border-radius: 18px;
      font-size: 13px; color: #555; cursor: pointer; background: #fff;
      transition: all 0.12s; user-select: none;
    }
    .chip:hover { border-color: #5a7a3a; color: #5a7a3a; }
    .chip.on { background: #edf5e1; border-color: #5a7a3a; color: #5a7a3a; font-weight: 600; }
    .chip.on::before { content: "✓ "; font-size: 11px; }

    /* 주소 검색 버튼 — input과 같은 높이 */
    .btn-addr {
      padding: 0 16px; border: 1px solid #5a7a3a; background: #fff; color: #5a7a3a;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; height: 40px; transition: all 0.12s;
    }
    .btn-addr:hover { background: #edf5e1; }

    /* 주소 3행: 우편번호(작게) + 버튼 + 기본주소(넓게) */
    .addr-row {
      display: grid; grid-template-columns: 120px auto 1fr; gap: 10px;
      align-items: end;
    }

    .upload-area {
      border: 2px dashed #ddd; border-radius: 10px; padding: 30px;
      text-align: center; color: #aaa; cursor: pointer; transition: all 0.15s;
    }
    .upload-area:hover { border-color: #5a7a3a; background: #fafdf6; }
    .upload-area .u-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-area .u-text { font-size: 13px; color: #888; }
    .upload-area .u-sub { font-size: 10px; color: #bbb; margin-top: 3px; }

    .info-box {
      background: #f5f9f0; border: 1px solid #d5dfc8; border-radius: 8px;
      padding: 12px 16px; font-size: 12px; color: #5a7a3a; line-height: 1.5;
    }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel {
      padding: 10px 32px; border: 1px solid #ddd; background: #fff;
      border-radius: 8px; font-size: 14px; font-weight: 600; color: #666; cursor: pointer;
    }
    .btn-cancel:hover { background: #f9f9f9; }
    .btn-submit {
      padding: 10px 32px; border: none; background: #5a7a3a;
      border-radius: 8px; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer;
    }
    .btn-submit:hover { background: #4d6b30; }
    .err-border { border-color: #e55353 !important; }
  </style>
</head>
<body>

<header class="gnb">
  <div class="gnb-inner">
    <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
    <nav class="gnb-nav">
      <a href="#"                              data-menu="홈">홈</a>
      <a href="farm-manage.html"               data-menu="농장관리">농장관리</a>
      <a href="../balance/balance-list.html"    data-menu="밸런스">밸런스</a>
      <a href="../recommend/recommend-list.html" data-menu="추천">추천</a>
      <a href="../policy/policy-list.html"      data-menu="정책">정책</a>
      <a href="../community/community-list.html" data-menu="커뮤니티">커뮤니티</a>
      <a href="../shop/product-browse.html"     data-menu="상점">상점</a>
      <a href="../stores/store-map.html"        data-menu="가게">가게</a>
    </nav>
    <div class="gnb-right">
      <div class="gnb-icon">🔔</div>
      <div class="gnb-icon">👤</div>
    </div>
  </div>
</header>

<div class="breadcrumb">
  <a href="../../index.html">홈</a> <span>›</span>
  <a href="farm-manage.html">농장관리</a> <span>›</span>
  <strong>농장 등록 신청</strong>
</div>

<div class="page">
  <h1 class="page-title"><span class="icon">📋</span> 농장 등록 신청</h1>

  <div class="card reg-card">
    <h2 class="card-title">농장 기본 정보</h2>

    <!-- 1행: 농장명 / 면적 / 토양유형 -->
    <div class="row-3">
      <div class="fg">
        <label class="fg-label">농장명 <span class="req">*</span></label>
        <input class="fi" id="farmName" placeholder="예: 양평 해맑은 농장">
      </div>
      <div class="fg">
        <label class="fg-label">면적 (㎡) <span class="req">*</span></label>
        <input class="fi" id="farmArea" type="number" placeholder="예: 3300">
      </div>
      <div class="fg">
        <label class="fg-label">토양 유형 <span class="req">*</span></label>
        <select class="fs" id="soilType">
          <option value="">선택하세요</option>
          <option value="양토">양토</option>
          <option value="사양토">사양토</option>
          <option value="식양토">식양토</option>
          <option value="식토">식토</option>
        </select>
      </div>
    </div>

    <!-- 2행: 주요작물 + 사업자번호 -->
    <div class="row-2-1">
      <div class="fg">
        <label class="fg-label">주요 작물 <span class="opt">복수선택</span></label>
        <div class="crop-chips" id="cropChips"></div>
      </div>
      <div class="fg">
        <label class="fg-label">사업자 등록 번호 <span class="opt">선택</span></label>
        <input class="fi" id="bizNo" placeholder="예) 123-45-67890" maxlength="12" oninput="fmtBiz(this)">
        <div class="fg-hint">사업자 등록번호가 있으면 입력</div>
      </div>
    </div>

    <!-- 3행: 우편번호 + 검색 + 기본주소 -->
    <div class="addr-row" style="margin-bottom:10px;">
      <div class="fg">
        <label class="fg-label">주소 <span class="req">*</span></label>
        <input class="fi" id="zipCode" placeholder="우편번호" readonly>
      </div>
      <div class="fg" style="justify-content:flex-end;">
        <button class="btn-addr" type="button" onclick="alert('주소 검색 API 연동 예정')">🔍 주소 검색</button>
      </div>
      <div class="fg" style="justify-content:flex-end;">
        <input class="fi" id="baseAddr" placeholder="주소 검색을 통해 입력됩니다" readonly>
      </div>
    </div>

    <!-- 4행: 상세주소 전체 너비 -->
    <div class="fg">
      <input class="fi" id="address" placeholder="상세 주소를 입력하세요">
    </div>
  </div>

  <!-- 증빙 서류 -->
  <div class="card reg-card">
    <h2 class="card-title">증빙 서류</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="u-icon">📎</div>
      <div class="u-text">농장 관련 증빙 서류를 업로드하세요</div>
      <div class="u-sub">JPEG, PNG, PDF (최대 10MB)</div>
    </div>
    <input type="file" id="fileInput" style="display:none;" multiple accept=".jpg,.jpeg,.png,.pdf">
  </div>

  <div class="info-box">
    💡 <strong>안내:</strong> 농장 등록 신청 후 관리자 승인까지 약 1~3일이 소요됩니다. 승인 완료 시 알림으로 안내드립니다.
  </div>

  <div class="form-actions">
    <button class="btn-cancel" onclick="location.href='farm-manage.html'">취소</button>
    <button class="btn-submit" onclick="submitForm()">신청하기</button>
  </div>
</div>

<script>
var crops=["상추","배추","고추","토마토","오이","청경채","무","당근","감자","고구마","기타"];
var picked=[];
function renderChips(){
  var el=document.getElementById('cropChips');el.innerHTML='';
  crops.forEach(function(c){
    var s=document.createElement('span');
    s.className='chip'+(picked.indexOf(c)>=0?' on':'');
    s.textContent=c;
    s.onclick=function(){toggle(c);};
    el.appendChild(s);
  });
}
function toggle(c){var i=picked.indexOf(c);if(i>=0)picked.splice(i,1);else picked.push(c);renderChips();}
function fmtBiz(el){
  var v=el.value.replace(/[^0-9]/g,'');
  if(v.length>10)v=v.substring(0,10);
  if(v.length>5)el.value=v.substring(0,3)+'-'+v.substring(3,5)+'-'+v.substring(5);
  else if(v.length>3)el.value=v.substring(0,3)+'-'+v.substring(3);
  else el.value=v;
}
function submitForm(){
  var n=document.getElementById('farmName').value.trim();
  var a=document.getElementById('farmArea').value.trim();
  var d=document.getElementById('address').value.trim();
  var s=document.getElementById('soilType').value;
  var b=document.getElementById('bizNo').value.trim();
  var ok=true;
  [['farmName',n],['farmArea',a],['address',d],['soilType',s]].forEach(function(p){
    var e=document.getElementById(p[0]);
    if(!p[1]){e.classList.add('err-border');ok=false;}else{e.classList.remove('err-border');}
  });
  if(!ok){alert('필수 항목(*)을 모두 입력해주세요.');return;}
  var fd={farmName:n,area:Number(a),address:d,soilType:s,mainCrops:picked,businessNumber:b||null};
  console.log('===== 농장 등록 신청 =====');
  console.log(JSON.stringify(fd,null,2));
  alert('농장 등록 신청이 완료되었습니다.');
}
document.querySelectorAll('.gnb-nav a').forEach(function(a){
  if(a.getAttribute('data-menu')==='농장관리') a.classList.add('active');
});
renderChips();
</script>
</body>
</html>
