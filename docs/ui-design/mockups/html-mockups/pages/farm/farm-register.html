<!DOCTYPE html>

  <meta charset="UTF-8"><meta name="viewport" content="width=1440">

</head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav">
    <a href="#" data-menu="홈">홈</a>
    <a href="farm-manage.html" data-menu="농장관리" class="active">농장관리</a>
    <a href="../balance/balance-list.html" data-menu="밸런스">밸런스</a>
    <a href="../recommend/recommend-list.html" data-menu="추천">추천</a>
    <a href="../policy/policy-list.html" data-menu="정책">정책</a>
    <a href="../community/community-list.html" data-menu="커뮤니티">커뮤니티</a>
    <a href="../shop/product-browse.html" data-menu="상점">상점</a>
    <a href="../stores/store-map.html" data-menu="가게">가게</a>
  </nav>
  <div class="gnb-right"><div class="gnb-icon">🔔</div><div class="gnb-icon">👤</div></div>
</div></header>

<div class="breadcrumb"><a href="../../index.html">홈</a> <span>›</span> 농장관리 <span>›</span> <strong>농장 등록 신청</strong></div>

<div class="page">
  <h1 class="page-title"><span class="icon">📋</span> 농장 등록 신청</h1>

  <div class="card">
    <h2 class="card-title">농장 기본 정보</h2>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">농장명 <span class="text-red">*</span></label>
        <input class="form-input" placeholder="예: 양평 해맑은 농장">
      </div>
      <div class="form-group">
        <label class="form-label">면적 (㎡) <span class="text-red">*</span></label>
        <input class="form-input" type="number" placeholder="3300">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">주소 <span class="text-red">*</span></label>
      <div class="flex gap-8 mb-8">
        <input class="form-input" placeholder="우편번호" style="flex:1;" readonly>
        <button class="btn btn-outline btn-sm">주소 검색</button>
      </div>
      <input class="form-input" placeholder="상세 주소를 입력하세요">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">토양 유형 <span class="text-red">*</span></label>
        <select class="form-select">
          <option>선택하세요</option>
          <option>양토</option>
          <option>사양토</option>
          <option>식양토</option>
          <option>식토</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">주요 작물</label>
        <input class="form-input" placeholder="예: 상추, 배추, 고추">
      </div>
    </div>
  </div>

  <div class="card">
    <h2 class="card-title">증빙 서류</h2>
    <div class="upload-zone">
      <div class="upload-icon">📎</div>
      <div>농장 관련 증빙 서류를 업로드하세요</div>
      <div style="font-size:11px;margin-top:4px;color:#bbb;">JPEG, PNG, PDF (최대 10MB)</div>
    </div>
  </div>

  <div class="card" style="background:var(--olive-bg);border-color:var(--olive);">
    <p style="font-size:13px;color:var(--olive-dark);">
      💡 <strong>안내:</strong> 농장 등록 신청 후 관리자 승인까지 약 1~3일이 소요됩니다. 승인 완료 시 알림으로 안내드립니다.
    </p>
  </div>

  <div class="btn-row btn-row-right">
    <button class="btn btn-gray">취소</button>
    <button class="btn btn-primary">신청하기</button>
  </div>
</div>
</body>
</html>
