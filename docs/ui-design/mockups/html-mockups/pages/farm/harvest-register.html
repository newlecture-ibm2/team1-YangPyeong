<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=1440">
  <title>수확 실적 등록 — FarmBalance</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav">
    <a href="#">홈</a>
    <a href="farm-manage.html" class="active">농장관리</a>
    <a href="../balance/balance-list.html">밸런스</a>
    <a href="../recommend/recommend-list.html">추천</a>
    <a href="../policy/policy-list.html">정책</a>
    <a href="../community/community-list.html">커뮤니티</a>
    <a href="../shop/product-browse.html">상점</a>
    <a href="../stores/store-map.html">가게</a>
  </nav>
  <div class="gnb-right"><div class="gnb-icon">🔔</div><div class="gnb-icon">👤</div></div>
</div></header>

<div class="breadcrumb"><a href="../../index.html">홈</a> <span>›</span> 농장관리 <span>›</span> <strong>수확 실적 등록</strong></div>

<div class="page">
  <h1 class="page-title"><span class="icon">🥕</span> 수확 실적 등록 <span class="badge badge-phase2">Phase 2</span></h1>

  <div class="card">
    <h2 class="card-title">수확 정보</h2>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">파종 계획 선택 <span class="text-red">*</span></label>
        <select class="form-select">
          <option>파종 계획을 선택하세요</option>
          <option>상추 — 800㎡ (2026-03-01)</option>
          <option>배추 — 700㎡ (2026-03-15)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">수확일 <span class="text-red">*</span></label>
        <input class="form-input" type="date">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">실제 수확량 (kg) <span class="text-red">*</span></label>
        <input class="form-input" type="number" placeholder="180">
      </div>
      <div class="form-group">
        <label class="form-label">품질 등급</label>
        <select class="form-select">
          <option>선택하세요</option>
          <option>특</option>
          <option>상</option>
          <option>중</option>
          <option>하</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">비고</label>
      <textarea class="form-textarea" placeholder="수확 결과에 대한 메모"></textarea>
    </div>
  </div>

  <div class="card">
    <h2 class="card-title">이전 수확 이력</h2>
    <table class="tbl">
      <thead><tr><th>작물</th><th>수확일</th><th>수확량</th><th>품질</th><th>달성률</th></tr></thead>
      <tbody>
        <tr><td>상추</td><td>2025-11-20</td><td>160kg</td><td><span class="badge badge-green">상</span></td><td>107%</td></tr>
        <tr><td>배추</td><td>2025-12-05</td><td>280kg</td><td><span class="badge badge-olive">중</span></td><td>93%</td></tr>
      </tbody>
    </table>
  </div>

  <div class="btn-row btn-row-right">
    <button class="btn btn-gray">취소</button>
    <button class="btn btn-primary">등록하기</button>
  </div>
</div>
</body>
</html>
