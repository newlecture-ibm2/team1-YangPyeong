<!DOCTYPE html>
<html lang="ko" data-active="농장관리">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>종자 구매 등록 — FarmBalance 화면설계</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .seed-cards { display: flex; flex-direction: column; gap: 20px; }

    .seed-card {
      background: #fff; border: 1px solid #e2e2e2; border-radius: 14px;
      padding: 28px; position: relative;
      transition: box-shadow 0.2s;
    }
    .seed-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .seed-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0;
    }
    .seed-card-num {
      font-size: 16px; font-weight: 700; color: #5a7a3a;
      display: flex; align-items: center; gap: 8px;
    }
    .seed-card-num .num-badge {
      background: #edf5e1; color: #5a7a3a; font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 12px;
    }
    .btn-delete-card {
      background: none; border: 1px solid #e2e2e2; color: #999;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .btn-delete-card:hover { background: #fff0f0; border-color: #e55353; color: #e55353; }
    .btn-delete-card:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-delete-card:disabled:hover { background: none; border-color: #e2e2e2; color: #999; }

    .seed-form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-size: 13px; font-weight: 600; color: #555;
      display: flex; align-items: center; gap: 4px;
    }
    .form-label .req { color: #e55353; font-weight: 700; }
    .form-select, .form-input {
      padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; color: #333; background: #fff;
      transition: border-color 0.15s;
    }
    .form-select:focus, .form-input:focus {
      outline: none; border-color: #5a7a3a; box-shadow: 0 0 0 3px rgba(90,122,58,0.1);
    }
    .form-select:disabled { background: #f5f5f5; color: #aaa; }

    .harvest-row {
      display: flex; gap: 8px; align-items: center;
    }
    .harvest-row .form-input { flex: 1; }
    .harvest-row .form-select { width: 90px; flex-shrink: 0; }

    .card-error {
      margin-top: 16px; padding: 10px 14px; background: #fff5f5;
      border: 1px solid #ffd0d0; border-radius: 8px;
      font-size: 13px; color: #e55353; display: none;
    }
    .card-error.show { display: block; }

    .btn-add-seed {
      background: #5a7a3a; color: #fff; border: none;
      padding: 10px 24px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-add-seed:hover { background: #4d6b30; }

    .form-actions {
      display: flex; gap: 12px; justify-content: center; margin-top: 32px;
    }
    .btn-cancel {
      padding: 12px 40px; border: 1px solid #ddd; background: #fff;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      color: #666; cursor: pointer;
    }
    .btn-cancel:hover { background: #f9f9f9; }
    .btn-submit {
      padding: 12px 40px; border: none; background: #5a7a3a;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      color: #fff; cursor: pointer;
    }
    .btn-submit:hover { background: #4d6b30; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .top-bar-info { font-size: 14px; color: #888; }
    .top-bar-info strong { color: #5a7a3a; }
  </style>
</head>
<body>

<!-- GNB -->
<header class="gnb">
  <div class="gnb-inner">
    <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
    <nav class="gnb-nav">
      <a href="#"                              data-menu="홈">홈</a>
      <a href="farm-manage.html"               data-menu="농장관리">농장관리</a>
      <a href="../balance/balance-list.html"    data-menu="밸런스">밸런스</a>
      <a href="../recommend/recommend-list.html" data-menu="추천">추천</a>
      <a href="../policy/policy-list.html"      data-menu="정책">정책</a>
      <a href="../community/community-list.html" data-menu="커뮤니티">커뮤니티</a>
      <a href="../shop/product-browse.html"     data-menu="상점">상점</a>
      <a href="../stores/store-map.html"        data-menu="가게">가게</a>
    </nav>
    <div class="gnb-right">
      <div class="gnb-icon">🔔</div>
      <div class="gnb-icon">👤</div>
    </div>
  </div>
</header>

<!-- 브레드크럼 -->
<div class="breadcrumb">
  <a href="../../index.html">홈</a> <span>›</span>
  <a href="farm-manage.html">농장관리</a> <span>›</span>
  <strong>종자 구매 등록</strong>
</div>

<!-- ======== 본문 ======== -->
<div class="page">
  <h1 class="page-title"><span class="icon">🌱</span> 종자 구매 등록</h1>

  <!-- 상단 바 -->
  <div class="top-bar">
    <div class="top-bar-info">등록된 종자 <strong id="seedCount">1</strong>건</div>
    <button class="btn-add-seed" onclick="addCard()">＋ 종자 추가</button>
  </div>

  <!-- 종자 카드 컨테이너 -->
  <div class="seed-cards" id="seedCards">
    <!-- JS가 초기 카드 1개를 렌더링 -->
  </div>

  <!-- 하단 버튼 -->
  <div class="form-actions">
    <button class="btn-cancel" onclick="location.href='farm-manage.html'">취소</button>
    <button class="btn-submit" onclick="submitAll()">등록하기</button>
  </div>
</div>

<script>
// ── 더미 데이터 ──
var cropCategories = [
  { id: "leaf",  name: "엽채류", seeds: ["상추", "청경채", "배추", "시금치", "깻잎"] },
  { id: "root",  name: "근채류", seeds: ["무", "당근", "감자", "고구마"] },
  { id: "fruit", name: "과채류", seeds: ["토마토", "오이", "고추", "호박", "가지"] },
  { id: "grain", name: "곡류",   seeds: ["쌀", "보리", "밀", "옥수수"] },
  { id: "veg",   name: "채소류", seeds: ["브로콜리", "양배추", "콜라비"] }
];
var units = ["g", "kg", "ton"];

var cardIdCounter = 0;

function createCardHTML(cardId, cardNum) {
  var catOptions = cropCategories.map(function(c){
    return '<option value="'+c.id+'">'+c.name+'</option>';
  }).join('');

  var unitOptions = units.map(function(u){
    return '<option value="'+u+'"'+(u==='kg'?' selected':'')+'>'+u+'</option>';
  }).join('');

  return ''
    + '<div class="seed-card" id="card-'+cardId+'" data-id="'+cardId+'">'
    + '  <div class="seed-card-header">'
    + '    <div class="seed-card-num">'
    + '      <span class="num-badge">'+cardNum+'</span> 종자 정보'
    + '    </div>'
    + '    <button class="btn-delete-card" onclick="removeCard('+cardId+')" title="삭제">✕</button>'
    + '  </div>'
    + '  <div class="seed-form-grid">'
    + '    <div class="form-group">'
    + '      <label class="form-label">작물 분류 <span class="req">*</span></label>'
    + '      <select class="form-select" id="cat-'+cardId+'" onchange="onCatChange('+cardId+')">'
    + '        <option value="">선택하세요</option>'
    + '        '+catOptions
    + '      </select>'
    + '    </div>'
    + '    <div class="form-group">'
    + '      <label class="form-label">종자명 <span class="req">*</span></label>'
    + '      <select class="form-select" id="seed-'+cardId+'" disabled>'
    + '        <option value="">작물 분류를 먼저 선택하세요</option>'
    + '      </select>'
    + '    </div>'
    + '    <div class="form-group">'
    + '      <label class="form-label">예상 총 수확량</label>'
    + '      <div class="harvest-row">'
    + '        <input type="number" class="form-input" id="yield-'+cardId+'" placeholder="예) 500" min="0">'
    + '        <select class="form-select" id="unit-'+cardId+'">'
    + '          '+unitOptions
    + '        </select>'
    + '      </div>'
    + '    </div>'
    + '    <div class="form-group">'
    + '      <label class="form-label">씨앗 수량</label>'
    + '      <input type="number" class="form-input" id="qty-'+cardId+'" placeholder="예) 10" min="0">'
    + '    </div>'
    + '  </div>'
    + '  <div class="card-error" id="err-'+cardId+'">'
    + '    ⚠️ 예상 총 수확량 또는 씨앗 수량 중 하나는 입력해야 합니다.'
    + '  </div>'
    + '</div>';
}

function refreshNumbers() {
  var cards = document.querySelectorAll('#seedCards .seed-card');
  cards.forEach(function(card, i){
    card.querySelector('.num-badge').textContent = i + 1;
  });
  document.getElementById('seedCount').textContent = cards.length;
  // 카드가 1개면 삭제 버튼 비활성화
  var delBtns = document.querySelectorAll('#seedCards .btn-delete-card');
  delBtns.forEach(function(btn){
    btn.disabled = cards.length <= 1;
  });
}

function addCard() {
  cardIdCounter++;
  var container = document.getElementById('seedCards');
  var count = container.querySelectorAll('.seed-card').length + 1;
  container.insertAdjacentHTML('beforeend', createCardHTML(cardIdCounter, count));
  refreshNumbers();
  // 스크롤 이동
  var newCard = document.getElementById('card-' + cardIdCounter);
  if (newCard) newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function removeCard(cardId) {
  var cards = document.querySelectorAll('#seedCards .seed-card');
  if (cards.length <= 1) return;
  var el = document.getElementById('card-' + cardId);
  if (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(-10px)';
    el.style.transition = 'all 0.2s';
    setTimeout(function(){ el.remove(); refreshNumbers(); }, 200);
  }
}

function onCatChange(cardId) {
  var catVal = document.getElementById('cat-' + cardId).value;
  var seedSelect = document.getElementById('seed-' + cardId);
  seedSelect.innerHTML = '';

  if (!catVal) {
    seedSelect.innerHTML = '<option value="">작물 분류를 먼저 선택하세요</option>';
    seedSelect.disabled = true;
    return;
  }

  var cat = cropCategories.find(function(c){ return c.id === catVal; });
  seedSelect.disabled = false;
  seedSelect.innerHTML = '<option value="">종자를 선택하세요</option>';
  cat.seeds.forEach(function(s){
    seedSelect.innerHTML += '<option value="'+s+'">'+s+'</option>';
  });
}

function submitAll() {
  var cards = document.querySelectorAll('#seedCards .seed-card');
  var allValid = true;
  var results = [];

  cards.forEach(function(card){
    var id = card.getAttribute('data-id');
    var cat    = document.getElementById('cat-' + id).value;
    var seed   = document.getElementById('seed-' + id).value;
    var yieldV = document.getElementById('yield-' + id).value;
    var unit   = document.getElementById('unit-' + id).value;
    var qty    = document.getElementById('qty-' + id).value;
    var errEl  = document.getElementById('err-' + id);

    // 필수 체크
    var catSel   = document.getElementById('cat-' + id);
    var seedSel  = document.getElementById('seed-' + id);
    catSel.style.borderColor  = cat  ? '#ddd' : '#e55353';
    seedSel.style.borderColor = seed ? '#ddd' : '#e55353';

    // 수확량 또는 수량 중 하나 필수
    var hasAmount = (yieldV && Number(yieldV) > 0) || (qty && Number(qty) > 0);
    if (errEl) {
      if (!hasAmount) {
        errEl.classList.add('show');
      } else {
        errEl.classList.remove('show');
      }
    }

    if (!cat || !seed || !hasAmount) {
      allValid = false;
    } else {
      results.push({
        category: cat,
        seedName: seed,
        estimatedYield: yieldV ? Number(yieldV) : null,
        yieldUnit: unit,
        seedQuantity: qty ? Number(qty) : null
      });
    }
  });

  if (allValid) {
    console.log('===== 종자 등록 데이터 =====');
    console.log(JSON.stringify(results, null, 2));
    alert('총 ' + results.length + '건의 종자가 등록되었습니다. (콘솔에서 데이터를 확인하세요)');
  }
}

// 초기 카드 1개 생성
addCard();

// GNB 활성화
document.querySelectorAll('.gnb-nav a').forEach(function(a){
  if(a.getAttribute('data-menu') === '농장관리') a.classList.add('active');
});
</script>
</body>
</html>
