<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=1440">
  <title>회원가입 — FarmBalance</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav"><a href="#">홈</a></nav>
</div></header>

<div class="page" style="max-width:520px;padding-top:40px;">
  <h1 class="page-title" style="justify-content:center;"><span class="icon">📝</span> 회원가입</h1>

  <div class="card">
    <div class="form-group">
      <label class="form-label">역할 선택</label>
      <div class="flex gap-8">
        <button class="btn btn-primary" style="flex:1;">일반 회원</button>
        <button class="btn btn-outline" style="flex:1;">지자체 담당자</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" placeholder="example@farmbalance.kr">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" placeholder="8자 이상">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호 확인</label>
      <input class="form-input" type="password" placeholder="비밀번호 재입력">
    </div>
    <div class="form-group">
      <label class="form-label">전화번호</label>
      <div class="flex gap-8">
        <input class="form-input" placeholder="010-1234-5678" style="flex:1;">
        <button class="btn btn-outline btn-sm">인증 요청</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">주소</label>
      <div class="flex gap-8 mb-8">
        <input class="form-input" placeholder="우편번호" style="flex:1;" readonly>
        <button class="btn btn-outline btn-sm">주소 검색</button>
      </div>
      <input class="form-input" placeholder="상세 주소">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px;">가입하기</button>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:#999;">
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>
  </div>
</div>
</body>
</html>
