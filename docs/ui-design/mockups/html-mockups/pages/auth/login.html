<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=1440">
  <title>로그인 — FarmBalance</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav"><a href="#">홈</a></nav>
</div></header>

<div class="page" style="max-width:480px;padding-top:60px;">
  <h1 class="page-title" style="justify-content:center;"><span class="icon">🔑</span> 로그인</h1>

  <div class="card">
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" placeholder="example@farmbalance.kr">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" placeholder="비밀번호를 입력하세요">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;">로그인</button>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:#999;">
      <a href="signup.html">회원가입</a> · <a href="password-reset.html">비밀번호 찾기</a>
    </div>

    <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:20px;text-align:center;">
      <button class="btn btn-outline" style="width:100%;background:#FEE500;color:#3C1E1E;border-color:#FEE500;">💬 카카오로 로그인</button>
    </div>
  </div>
</div>
</body>
</html>
