<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1440"><title>FarmBalance — 농업 수급 밸런스 플랫폼</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<header class="gnb"><div class="gnb-inner">
  <a href="../index.html" class="gnb-logo"><span>🌿</span> FarmBalance</a>
  <nav class="gnb-nav"></nav>
  <div class="gnb-right"><a href="auth/login.html" class="btn btn-outline btn-sm">로그인</a><a href="auth/signup.html" class="btn btn-primary btn-sm">회원가입</a></div>
</div></header>
<div style="text-align:center;padding:80px 0 40px;">
  <div style="font-size:48px;margin-bottom:16px;">🌾</div>
  <h1 style="font-size:36px;font-weight:800;color:var(--olive-dark);">FarmBalance</h1>
  <p style="font-size:20px;color:var(--text-sub);margin-top:8px;">농업 수급 밸런스 플랫폼</p>
  <p style="font-size:15px;color:var(--text-muted);margin-top:4px;">지역 농산물 수급 균형을 위한 데이터 기반 서비스</p>
  <div style="margin-top:32px;"><a href="auth/signup.html" class="btn btn-primary" style="font-size:16px;padding:14px 40px;">시작하기</a></div>

<div class="page">
  <div class="grid-3">
    <div class="card text-center" style="padding:32px;">
      <div style="font-size:36px;margin-bottom:12px;">📊</div>
      <h3 style="margin-bottom:8px;">실시간 수급 밸런스</h3>
      <p style="font-size:13px;color:var(--text-sub);">지역별·작물별 수급 현황을 실시간으로 확인하고 최적의 재배 결정을 내리세요.</p>
    </div>
    <div class="card text-center" style="padding:32px;">
      <div style="font-size:36px;margin-bottom:12px;">🤖</div>

      <p style="font-size:13px;color:var(--text-sub);">토양, 기후, 수급 데이터를 분석하여 나에게 맞는 최적의 작물을 추천합니다.</p>
    </div>
    <div class="card text-center" style="padding:32px;">
      <div style="font-size:36px;margin-bottom:12px;">🛒</div>
      <h3 style="margin-bottom:8px;">농산물 직거래 상점</h3>
      <p style="font-size:13px;color:var(--text-sub);">산지에서 소비자까지, 신선한 농산물을 합리적인 가격에 직거래하세요.</p>
    </div>
  </div>
